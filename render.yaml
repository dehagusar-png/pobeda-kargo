services:
  # 1. Боти Телеграм
  - type: web
    name: pobeda-kargo-bot
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npx ts-node src/index.ts
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: "20.14.0"

  # 2. Панели Маъмурият (Next.js)
  - type: web
    name: pobeda-admin-panel
    env: node
    plan: free
    rootDir: admin-panel
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: "20.14.0"
